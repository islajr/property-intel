name: API CI

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate Temporary JWT Keys for Tests
        run: |
          mkdir -p api/src/main/resources/keys
          openssl genpkey -algorithm RSA -out api/src/main/resources/keys/private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -pubout -in api/src/main/resources/keys/private.pem -out api/src/main/resources/keys/public.pem

      - name: Run Integration & Unit Tests
        run: ./mvnw clean test
        working-directory: api
