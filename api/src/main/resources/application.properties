# Database Connection
spring.application.name=api
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Logging config
logging.level.root=info
logging.level.io.propertyintel=debug

# Disable JPA auto-schema generation
spring.jpa.hibernate.ddl-auto=none

# Flyway-specific settings
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# OpenAPI config
springdoc.swagger-ui.tags-sorter=alpha

# Security config
accesstoken.expiry.milliseconds=${ACCESSTOKEN_EXPIRY_MILLISECONDS}
accesstoken.expiry.seconds=${ACCESSTOKEN_EXPIRY_SECONDS}
refreshtoken.expiry.seconds=${REFRESHTOKEN_EXPIRY_SECONDS}