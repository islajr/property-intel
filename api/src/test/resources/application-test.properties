# Test profile database & redis connection defaults
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/property_intel_test
spring.datasource.username=test_user
spring.datasource.password=test_password
spring.cache.type=redis
spring.data.redis.url=redis://localhost:6379

# JWT Signing Keys pointing to classpath/filesystem files for test runs
jwt.private-key-path=src/main/resources/keys/private.pem
jwt.public-key-path=src/main/resources/keys/public.pem

# Token expiry
accesstoken.expiry.milliseconds=3600000
accesstoken.expiry.seconds=3600
refreshtoken.expiry.seconds=86400

# Rate limits
ratelimit.auth.capacity=1000
ratelimit.auth.refill.tokens=1000
ratelimit.auth.refill.duration=1

ratelimit.public.capacity=1000
ratelimit.public.refill.tokens=1000
ratelimit.public.refill.duration=1

ratelimit.authenticated.capacity=1000
ratelimit.authenticated.refill.tokens=1000
ratelimit.authenticated.refill.duration=1

# Email configuration
resend.api-key=test_api_key
email.confirmation.expiryHours=24
email.sender.address=test@propertyintel.io

# General
application.baseURL=http://localhost:8080
